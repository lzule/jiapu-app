<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.22"/>
    </filter>
    <style>
      .ui { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #1f2937; }
      .small { font-size: 13px; fill: #6b7280; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .male { fill: #e3f2fd; stroke: #5c9bd4; }
      .female { fill: #fce4ec; stroke: #d48a9e; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .panel-title { font-size: 14px; font-weight: 600; fill: #111827; }
    </style>
  </defs>

  <rect width="1400" height="840" fill="url(#bg)"/>

  <rect x="24" y="20" width="1352" height="56" rx="10" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text class="ui title" x="44" y="54">KinCanvas Family Tree - Anonymous Demo</text>
  <text class="ui small" x="485" y="54">Offline • Drag & Link • SVG/PNG Export • Privacy-First</text>

  <rect x="24" y="92" width="290" height="724" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text class="ui panel-title" x="44" y="126">世代列表 / Generations</text>
  <rect x="40" y="146" width="258" height="54" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="ui" x="56" y="176" font-size="14" fill="#111827">始祖（2人）</text>
  <rect x="40" y="210" width="258" height="54" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="ui" x="56" y="240" font-size="14" fill="#111827">二世（4人）</text>
  <rect x="40" y="274" width="258" height="54" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="ui" x="56" y="304" font-size="14" fill="#111827">三世（5人）</text>
  <text class="ui small" x="44" y="360">支持折叠分支、搜索定位与快捷键调整顺序</text>

  <rect x="336" y="92" width="1040" height="724" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>

  <path class="line" d="M700 220 L790 220"/>
  <path class="line" d="M745 250 L745 286"/>
  <path class="line" d="M620 320 L870 320"/>
  <path class="line" d="M660 320 L660 360"/>
  <path class="line" d="M745 320 L745 360"/>
  <path class="line" d="M830 320 L830 360"/>

  <rect class="node male" x="640" y="190" width="120" height="60" rx="8"/>
  <text class="ui" x="700" y="225" text-anchor="middle" font-size="14" fill="#244f77">人物A</text>

  <rect class="node female" x="780" y="190" width="120" height="60" rx="8"/>
  <text class="ui" x="840" y="225" text-anchor="middle" font-size="14" fill="#7b3a56">人物B</text>

  <rect class="node male" x="600" y="360" width="120" height="60" rx="8"/>
  <text class="ui" x="660" y="395" text-anchor="middle" font-size="14" fill="#244f77">人物C</text>

  <rect class="node female" x="685" y="360" width="120" height="60" rx="8"/>
  <text class="ui" x="745" y="395" text-anchor="middle" font-size="14" fill="#7b3a56">人物D</text>

  <rect class="node" x="770" y="360" width="120" height="60" rx="8" fill="#f5f5f5" stroke="#9ca3af"/>
  <text class="ui" x="830" y="395" text-anchor="middle" font-size="14" fill="#475569">人物E</text>

  <rect x="364" y="112" width="232" height="108" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="ui panel-title" x="382" y="138">快捷操作 / Shortcuts</text>
  <text class="ui small" x="382" y="164">Alt + 拖拽：快速建关系</text>
  <text class="ui small" x="382" y="186">Shift + 滚轮：左右平移</text>
  <text class="ui small" x="382" y="208">Ctrl + Shift + ←/→：同辈排序</text>

  <rect x="1088" y="112" width="260" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text class="ui panel-title" x="1106" y="138">导出 / Export</text>
  <text class="ui small" x="1106" y="164">Full Tree SVG + UHD PNG</text>
  <text class="ui small" x="1106" y="186">折叠只影响当前显示，不影响导出</text>

  <text class="ui small" x="364" y="784">* 此图为匿名演示示例，不含任何真实家族信息</text>
</svg>
